# PsychoPy Preferences - Pre-configured for Gym-Anything
# Disables update checks, telemetry, and startup tips

[general]
units = height
winType = pyglet
audioLib = ['sounddevice', 'pygame', 'pyo']

[app]
showStartupTips = False
resetPrefs = False

[builder]
reloadPrevExp = False
unclutteredNamespace = False

[coder]
codeFont = DejaVu Sans Mono
commentFont = DejaVu Sans Mono
outputFont = DejaVu Sans Mono

[connections]
checkForUpdates = False
allowUsageStats = False

[hardware]
audioDevice = ['default']
