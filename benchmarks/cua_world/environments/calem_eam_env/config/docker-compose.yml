version: '3.8'

services:
  mysql:
    image: mysql:5.7
    container_name: calemeam-mysql
    restart: always
    command: --default-authentication-plugin=mysql_native_password --innodb_buffer_pool_size=256M
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: calemeam
      MYSQL_USER: calemeam
      MYSQL_PASSWORD: calemeam
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 30s

volumes:
  mysql_data:
