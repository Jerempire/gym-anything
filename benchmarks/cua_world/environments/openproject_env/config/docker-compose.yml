version: '3.8'

services:
  openproject:
    image: openproject/openproject:15
    container_name: openproject
    restart: always
    ports:
      - "8080:80"
    environment:
      OPENPROJECT_HOST__NAME: "localhost:8080"
      OPENPROJECT_HTTPS: "false"
      OPENPROJECT_SECRET_KEY_BASE: "openproject-env-secret-key-base-please-change"
      OPENPROJECT_DEFAULT__LANGUAGE: "en"

      # Deterministic admin account for task setup scripts
      OPENPROJECT_SEED_ADMIN_USER_NAME: "OpenProject Admin"
      OPENPROJECT_SEED_ADMIN_USER_PASSWORD: "Admin1234!"
      OPENPROJECT_SEED_ADMIN_USER_EMAIL: "admin@example.com"
      OPENPROJECT_SEED_ADMIN_USER_PASSWORD_RESET: "false"

      # Make API usage easier from scripts (explicit even if default)
      OPENPROJECT_APIV3__ENABLE__BASIC__AUTH: "true"

    volumes:
      - openproject_pgdata:/var/openproject/pgdata
      - openproject_assets:/var/openproject/assets

volumes:
  openproject_pgdata:
  openproject_assets:
