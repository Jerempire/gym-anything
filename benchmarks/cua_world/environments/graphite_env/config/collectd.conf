# collectd configuration for Graphite environment
# Collects REAL system metrics from the running VM and sends to Carbon

Hostname "ga-desktop"
FQDNLookup false

# Load interval: collect every 10 seconds
Interval 10

# ===== Input Plugins: Real system metrics =====

LoadPlugin cpu
<Plugin cpu>
    ReportByCpu true
    ReportByState true
    ValuesPercentage true
</Plugin>

LoadPlugin memory
<Plugin memory>
    ValuesAbsolute true
    ValuesPercentage true
</Plugin>

LoadPlugin disk
<Plugin disk>
    Disk "sda"
    Disk "vda"
    IgnoreSelected false
</Plugin>

LoadPlugin interface
<Plugin interface>
    Interface "eth0"
    Interface "ens3"
    Interface "lo"
    IgnoreSelected false
</Plugin>

LoadPlugin load

LoadPlugin df
<Plugin df>
    MountPoint "/"
    ReportByDevice false
    ValuesAbsolute true
    ValuesPercentage true
</Plugin>

LoadPlugin processes
<Plugin processes>
    CollectContextSwitch true
</Plugin>

LoadPlugin uptime
LoadPlugin users
LoadPlugin entropy
LoadPlugin swap

# ===== Output Plugin: Write to Graphite/Carbon =====

LoadPlugin write_graphite
<Plugin write_graphite>
    <Node "graphite">
        Host "localhost"
        Port "2003"
        Protocol "tcp"
        LogSendErrors true
        Prefix "collectd."
        StoreRates true
        AlwaysAppendDS false
        EscapeCharacter "_"
    </Node>
</Plugin>
