# SeisComP global configuration
agencyID = GYM
datacenterID = gym.seiscomp
organization = "Gym Anything Seismology Lab"

# Load MySQL database driver plugin
plugins = dbmysql

# Database connection
database = mysql://sysop:sysop@localhost/seiscomp

# Default region of interest (Southeast Asia / Western Pacific)
map.location = 0.0, 120.0
map.zoom = 3

# Processing defaults
picker.default.filter = "BW(4,1.0,10.0)"
magnitudes = ML, mb, Mw(mB), Ms_20, Ms(BB)
