# Sakai Configuration Properties
# Database connection
vendor@org.sakaiproject.db.api.SqlService=mysql
driverClassName@javax.sql.DataSource=org.mariadb.jdbc.Driver
hibernate.dialect=org.hibernate.dialect.MariaDB106Dialect
url@javax.sql.DataSource=jdbc:mariadb://127.0.0.1:3306/sakai?useUnicode=true&characterEncoding=UTF-8&useSSL=false&allowPublicKeyRetrieval=true
username@javax.sql.DataSource=sakai
password@javax.sql.DataSource=sakaipass
validationQuery@javax.sql.DataSource=select 1 from DUAL
defaultTransactionIsolationString@javax.sql.DataSource=TRANSACTION_READ_COMMITTED

# Auto DDL - create tables on first boot, disable after
auto.ddl=true

# Server URL
serverUrl=http://localhost:8080
serverName=localhost
portalPath=/portal

# Demo mode - enables sample user provider with 500+ students
# Users: admin/admin, instructor/sakai, student0001/sakai, etc.
providerId@org.sakaiproject.user.api.UserDirectoryProvider=org.sakaiproject.provider.user.SampleUserDirectoryProvider

# Email (disabled for demo)
smtp@org.sakaiproject.email.api.EmailService=localhost
smtpEnabled@org.sakaiproject.email.api.EmailService=false

# Content hosting
bodyPath@org.sakaiproject.content.api.ContentHostingService=/opt/sakai-data/content/

# UI settings
skin.default=morpheus-default
portal.neoChat=false
portal.bullhorns.enabled=true

# Session timeout (30 min)
inactiveInterval@org.sakaiproject.tool.api.SessionManager=1800

# Disable version check popup
version.service.checks.enabled=false

# Enable direct course site creation (no course info provider required)
wsetup.skipCourseSectionSelection=true
site.setup.creation.enabled=true

# Memory and performance
hibernate.cache.use_second_level_cache=true
hibernate.cache.use_query_cache=true
