# Real Kubernetes namespaces mimicking a production cluster setup
# Based on standard Kubernetes namespace patterns from production environments
---
apiVersion: v1
kind: Namespace
metadata:
  name: staging
  labels:
    environment: staging
    team: platform
    managed-by: rancher
  annotations:
    field.cattle.io/description: "Staging environment for pre-production testing"
---
apiVersion: v1
kind: Namespace
metadata:
  name: monitoring
  labels:
    environment: monitoring
    team: sre
    managed-by: rancher
  annotations:
    field.cattle.io/description: "Monitoring and observability stack"
---
apiVersion: v1
kind: Namespace
metadata:
  name: development
  labels:
    environment: development
    team: engineering
    managed-by: rancher
  annotations:
    field.cattle.io/description: "Development sandbox namespace"
