# SNMP Agent Configuration for localhost monitoring
# This provides real system metrics (CPU, memory, disk, network) to OpManager

# Listen on all interfaces
agentaddress udp:161

# SNMPv2c read-only community string
rocommunity public 127.0.0.1
rocommunity public localhost

# System information (real metadata for the monitored host)
syslocation "Data Center A, Rack 12, Unit 5"
syscontact sysadmin@opmanager-lab.local
sysservices 72

# Disk monitoring - real partition data
disk / 10000
disk /tmp 10000
disk /home 10000

# Process monitoring - real running services
proc sshd
proc snmpd
proc java

# Load average thresholds (1-min, 5-min, 15-min)
load 12 14 14

# Extend with real system commands for additional metrics
extend uptime /usr/bin/uptime
extend interfaces /bin/ip -br link show

# Interface statistics (real network interface data)
includeAllDisks 10%
