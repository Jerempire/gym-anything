<VirtualHost *:80>
    ServerName localhost
    ServerAlias *

    DocumentRoot /var/www/casebox/web

    <Directory /var/www/casebox/web>
        AllowOverride All
        Require all granted
        Options -Indexes +FollowSymLinks

        <IfModule mod_rewrite.c>
            RewriteEngine On
            RewriteCond %{REQUEST_FILENAME} !-f
            RewriteRule ^(.*)$ app.php [QSA,L]
        </IfModule>
    </Directory>

    <IfModule mod_php7.c>
        php_admin_value engine On
        php_admin_value safe_mode Off
        php_admin_value open_basedir "/var/www/casebox/:/tmp:/usr/share"
        php_admin_value max_execution_time 300
        php_admin_value upload_max_filesize 200M
        php_admin_value post_max_size 200M
        php_admin_value max_file_uploads 20
        php_admin_value memory_limit 256M
        php_admin_value expose_php Off
        php_admin_value short_open_tag On
    </IfModule>

    ErrorLog ${APACHE_LOG_DIR}/casebox_error.log
    CustomLog ${APACHE_LOG_DIR}/casebox_access.log combined
</VirtualHost>
