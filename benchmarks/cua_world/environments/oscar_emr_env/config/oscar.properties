# OSCAR EMR Properties File
# Configured for open-osp Docker container (openosp/open-osp image)
# Database: MariaDB 10.5 in oscar-db container

# Confidentiality statement
confidentiality_statement.v1= The information transmitted is intended only for the person to whom it is addressed and may contain confidential, proprietary and/or privileged material. Any unauthorized review, distribution or other use of or the taking of any action in reliance upon this information is prohibited. If you receive this in error, please contact the sender and delete or destroy this message. Thank you.

DEFAULT_FAX_COVERPAGE_COMMENT=This fax contains confidential patient information and should only be viewed by the intended recipient(s)

# LDAP (disabled)
ldap.enabled=false
ldap.url=ldap://localhost:389
ldap.baseDn=CN=Roles,CN=Providers,DC=OSCAR,DC=ca
ldap.authorization=false
ldap.authMethod=simple

# Build info
buildDate=2026-01-08 07:32 PM
buildVersion=Open version 24.09.10

# Database connection
# IMPORTANT: db_name includes JDBC parameters inline (required format for this OSCAR version)
# db_uri points to the MariaDB container (oscar-db) via Docker internal networking
db_name = oscar?zeroDateTimeBehavior=round&useOldAliasMetadataBehavior=true&jdbcCompliantTruncation=false&characterEncoding=UTF-8
db_username = oscar
db_password = oscar
db_type = mysql
db_driver = com.mysql.cj.jdbc.Driver
db_uri = jdbc:mysql://db/

# Connection pool settings
db_max_active = 32
db_max_idle = 8
db_max_wait = 20000
db_log_abandoned = true
db_remove_abandoned = true
db_remove_abandoned_timeout = 15
db_validationQuery = select 1

# Hibernate
hibernate.dialect=org.oscarehr.util.persistence.OscarMySQL5Dialect
hibernate.generate_statistics=false
hibernate.show_sql=false

# Drugref
drugref_url = http://localhost:8081/drugref2
drugref_route_search = off
drugref_route = topical,intravenous,disinfectant

# Clinical features
dxResearch_coding_sys = icd9,ichppccode
RX_ALLERGY_CHECKING=yes
RX_INTERACTION_LOCAL_DRUGREF_REGIONAL_IDENTIFIER=no
RX3=yes
RXFAX=no
FORMS_PROMOTEXT=
RENAL_DOSING_DS=yes
MYDRUGREF_DS=no
PREVENTION=yes
IMMUNIZATION_IN_PREVENTION=yes

# Document management
DOCUMENT_DOWNLOAD_METHOD = stream
DOC_FORWARD: /documentManager/complete.jsp
OscarDocumentDirectory=/var/lib/OscarDocument/

# Billing region: ON = Ontario
billregion=ON
billcenter = G
default_view = MFP
isNewONbilling=true

# Clinic info
clinic_no = 3821
inPatient = no
visit_type = Clinic Visit
visittype = O|Physician's office
dataCenterId = 00000

# Billing settings
DEFAULT_PAYMENT_METHOD=
BILLING_SUPERUSER=999998
BILLING_REVIEW_AUTO_PAYMENT=no
SOB_CHECKALL=yes
TESTING=no

# Vendor info
Vendor_Product = OSCARMcMaster, OSCARMcMaster ver11
Support_Contact = Demo Clinic (416) 555-0100

# OSCAR port
oscar_oscar_port=8080

# Security settings
SECURITY_AUDIT=false

# Enabled modules
ModuleNames=
