---
# AcmeCorp Monitoring Agent Configuration
monitoring:
  interval_seconds: 30
  targets:
    - name: acme-webapp
      url: http://acme-webapp:80/
      expected_status: 200
    - name: acme-gateway
      url: http://acme-gateway:5000/
      expected_status: 200
  alerts:
    email: ops-team@acmecorp.internal
    slack_channel: "#ops-alerts"
