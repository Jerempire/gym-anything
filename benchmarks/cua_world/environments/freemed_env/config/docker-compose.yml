version: '3.8'

# FreeMED EMR - single monolithic container (includes MySQL + Apache + PHP + FreeMED)
# jbuchbinder/freemed is a self-contained image with everything built-in
# URL: http://localhost:8080/freemed/
# Default admin credentials: admin / admin

services:
  freemed:
    image: jbuchbinder/freemed
    container_name: freemed-app
    ports:
      - "8080:80"
    restart: always
    volumes:
      - freemed_mysql:/var/lib/mysql
    # The container runs its own MySQL and Apache internally

volumes:
  freemed_mysql:
    driver: local
