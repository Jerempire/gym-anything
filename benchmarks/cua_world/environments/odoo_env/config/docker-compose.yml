version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: odoo-postgres
    restart: always
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: odoo
      POSTGRES_PASSWORD: odoo
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data/pgdata
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U odoo"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 30s

  odoo:
    image: odoo:17.0
    container_name: odoo-app
    restart: always
    ports:
      - "8069:8069"
    environment:
      HOST: postgres
      USER: odoo
      PASSWORD: odoo
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - odoo_data:/var/lib/odoo
      - odoo_addons:/mnt/extra-addons
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8069/web/database/selector"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 120s

volumes:
  postgres_data:
  odoo_data:
  odoo_addons:
