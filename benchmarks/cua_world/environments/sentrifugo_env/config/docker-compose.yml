services:
  sentrifugo-db:
    image: mysql:5.7
    container_name: sentrifugo-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpass123
      MYSQL_DATABASE: sentrifugo
      MYSQL_USER: sentrifugo
      MYSQL_PASSWORD: sentrifugo123
    volumes:
      - sentrifugo_db_data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpass123"]
      interval: 5s
      timeout: 5s
      retries: 30
    command: >
      --character-set-server=utf8
      --collation-server=utf8_general_ci
      --sql-mode=NO_ENGINE_SUBSTITUTION

volumes:
  sentrifugo_db_data:
