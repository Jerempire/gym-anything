version: '3.8'

# Axelor Open Suite - All-in-One Container
# Uses axelor/aio-erp which bundles PostgreSQL + Tomcat + nginx
# network_mode: host required because Docker iptables is disabled (breaks QEMU SSH)
# Admin credentials: admin / admin

services:
  axelor:
    image: axelor/aio-erp:latest
    container_name: axelor-app
    restart: unless-stopped
    network_mode: host
    environment:
      - NGINX_HOST=localhost
      - NGINX_PORT=80
      - POSTGRES_USER=axelor
      - POSTGRES_PASSWORD=axelor
      - POSTGRES_DB=axelor
      - CATALINA_OPTS=-Xmx4g -Xms512m
      - JAVA_OPTS=-Xmx4g -Xms512m
    volumes:
      - axelor_data:/var/lib/tomcat
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost/ || curl -sf http://localhost:8080/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 60
      start_period: 600s

volumes:
  axelor_data:
  postgres_data:
