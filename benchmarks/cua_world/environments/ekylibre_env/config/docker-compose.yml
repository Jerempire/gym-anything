version: '3.8'

# Ekylibre Farm Management System
# Services: web (Rails), db (PostgreSQL+PostGIS), redis
# Admin credentials: admin@ekylibre.org / 12345678
# URL: http://demo.ekylibre.local:3000

services:
  web:
    image: ekylibre-app:local
    container_name: ekylibre-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      RAILS_ENV: production
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ekylibre_production
      POSTGRES_USER: ekylibre
      POSTGRES_PASSWORD: ekylibre_password
      DB_HOST: db
      DB_PORT: "5432"
      DB_USERNAME: ekylibre
      DB_PASSWORD: ekylibre_password
      DB_PROD_NAME: ekylibre_production
      REDIS_URL: redis://redis:6379
      RAILS_SERVE_STATIC_FILES: "true"
      RAILS_LOG_TO_STDOUT: "true"
      HOST_DOMAIN_NAME: ekylibre.farm
      DEVISE_SECRET_KEY: cbfa6828e7f6f052484db145404f9b00bf3ba234fedcbb1db9c79b85c8f0291b65bc9fe2641853ed591d45d87310d33c9edafb0ad6b399c6c3752e3a4eb8e163
      SECRET_KEY_BASE: c4b280c6d3e57376151af41fbc69a5609a89c851b92da6c41216b7ed38323dde698f67d4d66f5aa0e9f1442bdae2a161e031a7b61fd68995b5a4ea37075dfd88
      GPG_EMAIL: ekylibre@example.org
      MAILER_SENDER: noreply@ekylibre.local
      ELASTIC_APM_ACTIVE: "false"
      MINIO_HOST: ""
    volumes:
      - ekylibre_storage:/app/storage
      - ekylibre_tmp:/app/tmp/cache
      # first_run demo data will be mounted here (path replaced by setup script)
      - FIRST_RUN_DATA_PATH:/app/db/first_runs/demo
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 30s
      timeout: 15s
      retries: 10
      start_period: 60s

  db:
    image: postgis/postgis:13-3.4
    container_name: ekylibre-db
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ekylibre_password
      POSTGRES_USER: ekylibre
      POSTGRES_DB: ekylibre_production
      TZ: Europe/Paris
    volumes:
      - ekylibre_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ekylibre -d ekylibre_production"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 10s

  redis:
    image: redis:5.0-alpine
    container_name: ekylibre-redis
    restart: unless-stopped
    volumes:
      - ekylibre_redis_data:/data

volumes:
  ekylibre_db_data:
  ekylibre_redis_data:
  ekylibre_storage:
  ekylibre_tmp:
