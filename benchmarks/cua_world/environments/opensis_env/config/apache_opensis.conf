<VirtualHost *:80>
    ServerAdmin webmaster@localhost
    DocumentRoot /var/www/html
    ServerName localhost

    # OpenSIS Directory Configuration
    <Directory /var/www/html/opensis>
        Options Indexes FollowSymLinks MultiViews
        AllowOverride All
        Require all granted

        # Enable URL rewriting
        RewriteEngine On

        # If the requested file or directory doesn't exist, route to index.php
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteCond %{REQUEST_FILENAME} !-d
        RewriteRule ^(.*)$ index.php?$1 [L,QSA]
    </Directory>

    # PHP settings for OpenSIS
    <FilesMatch \.php$>
        SetHandler application/x-httpd-php
    </FilesMatch>

    # Security headers
    Header always set X-Content-Type-Options nosniff
    Header always set X-Frame-Options SAMEORIGIN
    Header always set X-XSS-Protection "1; mode=block"

    # Logging
    ErrorLog ${APACHE_LOG_DIR}/opensis_error.log
    CustomLog ${APACHE_LOG_DIR}/opensis_access.log combined
    LogLevel warn

    # PHP configuration overrides
    php_value max_execution_time 300
    php_value memory_limit 256M
    php_value post_max_size 64M
    php_value upload_max_filesize 64M
    php_value session.gc_maxlifetime 3600
</VirtualHost>
